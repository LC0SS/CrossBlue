<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OPTCG Tournament Hub</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        /* Variables de couleur pour un thème sombre et moderne */
        :root {
            --bg-color: #0d1117;
            --card-bg: #161b22;
            --border-color: #30363d;
            --text-main: #c9d1d9;
            --text-muted: #8b949e;
            --accent-color: #f0e6d2; /* Teinte parchemin / One Piece */
            --btn-bg: #1f6feb;
            --btn-hover: #388bfd;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 1rem;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        header {
            text-align: center;
            margin-bottom: 2rem;
            width: 100%;
            max-width: 1200px;
        }

        h1 {
            color: var(--accent-color);
            font-size: 1.8rem;
            margin-bottom: 0.5rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .subtitle {
            color: var(--text-muted);
            font-size: 0.9rem;
            margin: 0;
        }

        /* Grille adaptative (Responsive Grid) */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(100%, 1fr));
            gap: 1rem;
            width: 100%;
            max-width: 1200px;
        }

        /* Design des cartes de tournois */
        .card {
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 1.25rem;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            transition: transform 0.2s ease, border-color 0.2s ease;
        }

        .card:hover {
            border-color: var(--text-muted);
            transform: translateY(-2px);
        }

        .card h3 {
            margin: 0 0 0.75rem 0;
            color: var(--accent-color);
            font-size: 1.2rem;
        }

        .card p {
            margin: 0.4rem 0;
            font-size: 0.9rem;
            color: var(--text-main);
        }

        .card p strong {
            color: var(--text-muted);
            font-weight: 500;
        }

        .filter-container {
            margin-bottom: 1.5rem;
            width: 100%;
            max-width: 1200px;
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .filter-container label {
            font-size: 0.9rem;
            color: var(--text-muted);
        }

        .filter-container select {
            background-color: var(--card-bg);
            color: var(--text-main);
            border: 1px solid var(--border-color);
            padding: 0.75rem;
            border-radius: 8px;
            font-size: 1rem;
            outline: none;
            cursor: pointer;
            width: 100%;
        }

        .filter-container select:focus {
            border-color: var(--btn-bg);
        }

        /* Bouton optimisé pour le clic tactile (Mobile) */
        .btn {
            display: block;
            text-align: center;
            background-color: var(--btn-bg);
            color: #ffffff;
            padding: 0.75rem;
            text-decoration: none;
            border-radius: 8px;
            font-weight: 600;
            font-size: 0.9rem;
            margin-top: 1.25rem;
            transition: background-color 0.2s ease;
        }

        .btn:hover {
            background-color: var(--btn-hover);
        }

        /* Media Queries : Dès que l'écran est assez grand (Tablette/PC), on passe en colonnes */
        @media (min-width: 600px) {
            .grid {
                grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            }
            h1 {
                font-size: 2.3rem;
            }
        }
    </style>
</head>
<body>

    <header>
        <h1>🏴‍☠️ OPTCG Regional Hub</h1>
        <p class="subtitle">Calendrier compétitif synchronisé en temps réel</p>
    </header>

    <div class="filter-container">
        <label for="regionFilter">Filtrer par Région :</label>
        <select id="regionFilter">
            <option value="all">Toutes les régions</option>
            <option value="NorthAmerica">North America</option>
            <option value="Europe">Europe</option>
            <option value="Oceania">Oceania</option>
            <option value="LatinAmerica">Latin America</option>
        </select>

        <label for="typeFilter" style="margin-top: 0.5rem;">Type de Tournoi :</label>
        <select id="typeFilter">
            <option value="all">Tous les types</option>
            <option value="Regional">🏆 Regionals</option>
            <option value="TreasureCup">💰 Treasure Cups</option>
        </select>
    </div>

    <div class="filter-container">
        <label class="checkbox-label" style="margin-top: 0.5rem; display: flex; align-items: center; gap: 0.5rem; cursor: pointer;">
            <input type="checkbox" id="hidePastFilter" checked>
            Masquer les tournois passés
        </label>
    </div>

    <div class="grid" id="calendar">
        </div>

    <script src="app.js"></script>
</body>
</html>
