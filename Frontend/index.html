<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OPTCG Tournament Hub</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #121212; color: #fff; padding: 20px; }
        h1 { text-align: center; color: #ffcc00; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; margin-top: 20px; }
        .card { background: #1e1e1e; border: 1px solid #333; padding: 15px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.3); }
        .card h3 { margin-top: 0; color: #00adb5; }
        .btn { display: inline-block; background: #ffcc00; color: #000; padding: 8px 12px; text-decoration: none; border-radius: 4px; font-weight: bold; margin-top: 10px; }
        .btn:hover { background: #ffe066; }
    </style>
</head>
<body>

    <h1>🏴‍☠️ OPTCG Competitive Hub 🏴‍☠️</h1>
    <div class="grid" id="calendar">
        </div>

    <script src="app.js"></script>
</body>
</html>
